<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teleprompter — Owen Young</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand-50: hsl(245 100% 96%);
      --brand-100: hsl(245 86% 92%);
      --brand-300: hsl(245 76% 75%);
      --brand-500: hsl(245 53% 54%);
      --brand-600: hsl(245 49% 45%);
      --brand-700: hsl(245 45% 34%);
      --brand-800: hsl(245 42% 24%);
      --brand-900: hsl(245 40% 16%);
    }

    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #app {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      width: 100%;
      max-width: 1600px;
      padding: 24px;
      transition: all 0.3s ease;
    }

    /* ── Teleprompter ── */
    #tp-wrap {
      background: #0a0a0a;
      border-radius: 12px;
      overflow: hidden;
      flex: 1 1 auto;
      min-width: 420px;
      position: relative;
      transition: box-shadow 0.2s ease;
    }
    #tp-wrap.resizing {
      box-shadow: 0 0 0 1px hsla(245, 53%, 54%, 0.5), 0 24px 80px rgba(0, 0, 0, 0.45);
      user-select: none;
    }

    #tp-header {
      background: #111;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #222;
      position: relative;
      z-index: 7;
    }
    #tp-header span { font-size: 14px; color: #666; letter-spacing: 0.05em; text-transform: uppercase; flex: 1; }

    #tp-viewport {
      height: 560px;
      overflow: hidden;
      position: relative;
      padding: 0 80px;
      background: #0a0a0a;
    }
    #fade-top {
      position: absolute; top: 0; left: 0; right: 0; height: 110px;
      background: linear-gradient(to bottom, #0a0a0a 30%, transparent);
      z-index: 2; pointer-events: none;
    }
    #fade-bottom {
      position: absolute; bottom: 0; left: 0; right: 0; height: 110px;
      background: linear-gradient(to top, #0a0a0a 30%, transparent);
      z-index: 2; pointer-events: none;
    }
    #focus-line {
      position: absolute; top: 50%; left: 80px; right: 80px;
      border-top: 1.5px solid var(--brand-700);
      z-index: 3; pointer-events: none;
      transform: translateY(-28px);
    }
    #tp-content {
      padding-top: 220px;
      padding-bottom: 240px;
      font-size: 38px;
      line-height: 1.75;
      color: var(--brand-50);
      letter-spacing: 0.01em;
      font-weight: 400;
      will-change: transform;
      transition: font-size 0.15s ease;
    }
    .para { margin-bottom: 1.4em; }

    #tp-controls {
      background: #111;
      border-top: 1px solid #222;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      position: relative;
      z-index: 9;
    }
    #tp-controls button,
    #tp-controls input {
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    #tp-controls label { font-size: 13px; color: #555; white-space: nowrap; }
    #tp-controls input[type=range] { flex: 1; min-width: 80px; accent-color: var(--brand-500); cursor: pointer; }

    .tp-btn {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #bbb;
      font-family: inherit;
      font-size: 14px;
      padding: 8px 18px;
      border-radius: 8px;
      cursor: pointer;
      white-space: nowrap;
      text-align: center;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    .tp-btn:hover { background: #222; color: #fff; }
    .tp-btn.active { background: var(--brand-900); border-color: var(--brand-500); color: var(--brand-500); }
    .tp-btn.edit-active { background: var(--brand-900); border-color: var(--brand-300); color: var(--brand-100); }
    .btn-icon {
      width: 13px;
      height: 13px;
      margin-right: 6px;
      vertical-align: -2px;
      fill: currentColor;
    }

    .font-btn {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #bbb;
      font-family: inherit;
      border-radius: 8px;
      cursor: pointer;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    .font-btn:hover { background: #222; color: #fff; border-color: #555; }

    #font-size-display { font-size: 12px; color: #444; min-width: 36px; text-align: center; font-family: monospace; }
    #speed-val { font-size: 12px; color: #444; min-width: 32px; text-align: right; font-family: monospace; }
    #progress-bar { height: 3px; background: #161616; }
    #progress-fill { height: 100%; background: var(--brand-500); width: 0%; transition: width 0.1s linear; }
    .divider { width: 1px; height: 26px; background: #2a2a2a; flex-shrink: 0; }
    #kb-hint {
      text-align: center;
      padding: 8px 8px 12px;
      font-size: 12px;
      color: #898894;
      font-family: monospace;
      background: #111;
    }
    #kb-hint {
      position: relative;
      z-index: 7;
    }

    body.is-resizing,
    body.is-resizing * {
      cursor: grabbing !important;
      user-select: none;
    }

    .resize-handle {
      position: absolute;
      width: 84px;
      height: 30px;
      border: none;
      background: transparent;
      cursor: grab;
      z-index: 8;
      touch-action: none;
      appearance: none;
      overflow: visible;
    }
    .corner-glow {
      position: absolute;
      width: 180px;
      height: 180px;
      background: radial-gradient(circle at var(--glow-x) var(--glow-y), hsla(245, 53%, 54%, 0.3) 0%, hsla(245, 53%, 54%, 0.16) 32%, hsla(245, 53%, 54%, 0.07) 56%, hsla(245, 53%, 54%, 0.02) 74%, hsla(245, 53%, 54%, 0) 100%);
      filter: blur(2px);
      opacity: 0;
      z-index: 10;
      transition: opacity 0.22s ease;
      pointer-events: none;
    }
    .corner-glow.active {
      opacity: 1;
    }
    .resize-handle.top-left { top: 0; left: 0; --glow-x: 0%; --glow-y: 0%; }
    .resize-handle.top-right { top: 0; right: 0; --glow-x: 100%; --glow-y: 0%; }
    .resize-handle.bottom-left { bottom: 0; left: 0; --glow-x: 0%; --glow-y: 100%; }
    .resize-handle.bottom-right { right: 0; bottom: 0; --glow-x: 100%; --glow-y: 100%; }
    .corner-glow.top-left { top: 0; left: 0; --glow-x: 0%; --glow-y: 0%; }
    .corner-glow.top-right { top: 0; right: 0; --glow-x: 100%; --glow-y: 0%; }
    .corner-glow.bottom-left { bottom: 0; left: 0; --glow-x: 0%; --glow-y: 100%; }
    .corner-glow.bottom-right { right: 0; bottom: 0; --glow-x: 100%; --glow-y: 100%; }
    #tp-wrap.resizing .resize-handle { cursor: grabbing; }

    /* ── Edit Panel ── */
    #edit-panel {
      width: 380px;
      flex-shrink: 0;
      background: #0f0f0f;
      border-radius: 12px;
      border: 1px solid #222;
      display: none;
      flex-direction: column;
      overflow: hidden;
      align-self: stretch;
      min-height: 660px;
    }
    #edit-panel.open { display: flex; }

    #edit-header {
      background: #161616;
      border-bottom: 1px solid #222;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #edit-header h2 { font-size: 13px; font-weight: 500; color: #888; letter-spacing: 0.06em; text-transform: uppercase; }

    #close-edit {
      background: none;
      border: none;
      color: #555;
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
      padding: 0 2px;
    }
    #close-edit:hover { color: #aaa; }

    #edit-instructions {
      padding: 12px 18px;
      font-size: 12px;
      color: #444;
      border-bottom: 1px solid #1a1a1a;
      line-height: 1.6;
    }

    #edit-textarea {
      flex: 1;
      background: #0a0a0a;
      border: none;
      outline: none;
      resize: none;
      color: var(--brand-100);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      line-height: 1.7;
      padding: 18px;
      caret-color: var(--brand-500);
    }
    #edit-textarea::placeholder { color: #2a2a2a; }
    #edit-textarea:focus { background: #0c0c0c; }

    #edit-footer {
      background: #161616;
      border-top: 1px solid #222;
      padding: 12px 18px;
      display: flex;
      gap: 10px;
    }

    .edit-btn {
      flex: 1;
      padding: 9px 0;
      border-radius: 8px;
      border: 1px solid #333;
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      text-align: center;
    }
    #btn-apply {
      background: var(--brand-900);
      border-color: var(--brand-500);
      color: var(--brand-500);
    }
    #btn-apply:hover { background: var(--brand-800); }
    #btn-cancel {
      background: #1a1a1a;
      color: #666;
    }
    #btn-cancel:hover { background: #222; color: #999; }

    #char-count {
      font-size: 11px;
      color: #333;
      text-align: right;
      padding: 4px 18px 0;
      font-family: monospace;
    }

    @media (max-width: 700px) {
      body {
        align-items: stretch;
        justify-content: stretch;
        min-height: 100dvh;
        overscroll-behavior: none;
      }

      #app {
        width: 100vw;
        min-height: 100dvh;
        max-width: none;
        padding: 0;
        gap: 0;
      }

      #tp-wrap {
        width: 100vw;
        min-width: 0;
        min-height: 100dvh;
        border-radius: 0;
        flex: 1 1 100%;
      }

      #tp-header {
        padding: 14px 18px;
      }

      #tp-viewport {
        height: calc(100dvh - 146px);
        min-height: 360px;
        padding: 0 26px;
      }

      #focus-line {
        left: 26px;
        right: 26px;
      }

      #tp-content {
        padding-top: 180px;
        padding-bottom: 220px;
        font-size: 32px;
        line-height: 1.65;
      }

      #tp-controls {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        padding: 12px 14px 16px;
        gap: 12px 10px;
      }

      #tp-controls .divider,
      #speed-val {
        display: none;
      }

      .control-play {
        grid-column: 1 / 3;
        grid-row: 1;
        width: 100%;
      }

      .control-reset {
        grid-column: 3 / 5;
        grid-row: 1;
        width: 100%;
      }

      .control-edit {
        grid-column: 5 / 7;
        grid-row: 1;
        width: 100%;
      }

      .font-decrease {
        grid-column: 1;
        grid-row: 2;
      }

      .font-increase {
        grid-column: 2;
        grid-row: 2;
      }

      #font-size-display {
        grid-column: 3;
        grid-row: 2;
        align-self: center;
        min-width: 0;
        text-align: left;
      }

      .speed-label {
        grid-column: 4;
        grid-row: 2;
        align-self: center;
        justify-self: end;
      }

      #speed-slider {
        grid-column: 5 / 7;
        grid-row: 2;
        width: 100%;
        min-width: 0;
        align-self: center;
      }

      #kb-hint {
        display: none;
      }

      #edit-panel {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100dvh;
        min-height: 0;
        border: none;
        border-radius: 0;
        z-index: 50;
      }

      #edit-header {
        padding: 14px 18px;
        flex-shrink: 0;
      }

      #edit-instructions {
        padding: 10px 18px;
        flex-shrink: 0;
      }

      #edit-textarea {
        min-height: 0;
        font-size: 16px;
        line-height: 1.6;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }

      #char-count,
      #edit-footer {
        flex-shrink: 0;
      }
    }

    @media (max-width: 900px) and (orientation: landscape) {
      body,
      #app,
      #tp-wrap {
        height: 100dvh;
        min-height: 0;
        overflow: hidden;
      }

      body {
        align-items: stretch;
        justify-content: stretch;
      }

      #app {
        width: 100vw;
        max-width: none;
        padding: 0;
        gap: 0;
      }

      #tp-wrap {
        width: 100vw;
        min-width: 0;
        border-radius: 0;
        display: flex;
        flex-direction: column;
        flex: 1 1 100%;
      }

      #tp-header {
        padding: 8px 14px;
        flex-shrink: 0;
      }

      #tp-header span {
        font-size: 12px;
      }

      #progress-bar {
        flex-shrink: 0;
      }

      #tp-viewport {
        flex: 1 1 auto;
        height: auto;
        min-height: 0;
        padding: 0 36px;
      }

      #fade-top,
      #fade-bottom {
        height: 70px;
      }

      #focus-line {
        left: 36px;
        right: 36px;
      }

      #tp-content {
        padding-top: 105px;
        padding-bottom: 140px;
        font-size: 28px;
        line-height: 1.5;
      }

      #tp-controls {
        display: grid;
        grid-template-columns: auto auto auto auto 1fr auto;
        padding: 8px 12px;
        gap: 8px;
        flex-shrink: 0;
        align-items: center;
      }

      .control-play,
      .control-reset,
      .control-edit,
      .font-decrease,
      .font-increase,
      #font-size-display,
      .speed-label,
      #speed-slider {
        grid-row: 1;
        width: auto;
      }

      .control-play { grid-column: 1; }
      .control-reset { grid-column: 2; }
      .font-decrease { grid-column: 3; }
      .font-increase { grid-column: 4; }
      #speed-slider { grid-column: 5; }
      .control-edit { grid-column: 6; }

      #font-size-display,
      .speed-label {
        display: none;
      }

      #speed-val,
      #tp-controls .divider,
      #kb-hint {
        display: none;
      }

      .tp-btn {
        padding: 7px 12px;
      }

      .font-btn {
        width: 34px;
        height: 34px;
      }
    }
  </style>

</head>
<body>
<div id="app">

  <!-- Teleprompter -->
  <div id="tp-wrap">
    <div id="tp-header">
      <span>Impromptu</span>
    </div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div id="tp-viewport">
      <div id="fade-top"></div>
      <div id="fade-bottom"></div>
      <div id="focus-line"></div>
      <div id="tp-content"></div>
    </div>
    <div id="tp-controls">
      <button class="tp-btn control-play" id="play-btn" onclick="togglePlay()"></button>
      <button class="tp-btn control-reset" onclick="resetScroll()">&#8635; Reset</button>
      <div class="divider"></div>
      <label class="speed-label">Speed</label>
      <input type="range" id="speed-slider" min="5" max="120" value="35" oninput="updateSpeed(this.value)">
      <span id="speed-val">35</span>
      <div class="divider speed-divider"></div>
      <button class="font-btn font-decrease" data-font-delta="-2" title="Decrease font size" style="font-size:16px;">A</button>
      <button class="font-btn font-increase" data-font-delta="2" title="Increase font size" style="font-size:22px; font-weight:500;">A</button>
      <span id="font-size-display">38px</span>
      <div class="divider"></div>
      <button class="tp-btn control-edit" id="edit-btn" onclick="toggleEdit()">&#9998; Edit</button>
    </div>
    <div id="kb-hint">Space = play/pause &nbsp;|&nbsp; R = reset &nbsp;|&nbsp; + / &minus; = font size &nbsp;|&nbsp; E = edit</div>
    <button class="resize-handle top-left" type="button" aria-label="Resize teleprompter from top left" data-x="-1" data-y="-1"></button>
    <button class="resize-handle top-right" type="button" aria-label="Resize teleprompter from top right" data-x="1" data-y="-1"></button>
    <button class="resize-handle bottom-left" type="button" aria-label="Resize teleprompter from bottom left" data-x="-1" data-y="1"></button>
    <button class="resize-handle bottom-right" type="button" aria-label="Resize teleprompter from bottom right" data-x="1" data-y="1"></button>
    <div class="corner-glow top-left" aria-hidden="true"></div>
    <div class="corner-glow top-right" aria-hidden="true"></div>
    <div class="corner-glow bottom-left" aria-hidden="true"></div>
    <div class="corner-glow bottom-right" aria-hidden="true"></div>
  </div>

  <!-- Edit Panel -->
  <div id="edit-panel">
    <div id="edit-header">
      <h2>Edit Script</h2>
      <button id="close-edit" onclick="toggleEdit()" title="Close">&#215;</button>
    </div>
    <div id="edit-instructions">
      Each paragraph becomes a separate block in the teleprompter. Separate paragraphs with a blank line. Click <strong style="color:var(--brand-500);">Apply</strong> when done.
    </div>
    <textarea id="edit-textarea" placeholder="Paste or type your script here...&#10;&#10;Each blank line creates a new paragraph."></textarea>
    <div id="char-count">0 characters</div>
    <div id="edit-footer">
      <button class="edit-btn" id="btn-cancel" onclick="cancelEdit()">Cancel</button>
      <button class="edit-btn" id="btn-apply" onclick="applyEdit()">&#10003; Apply</button>
    </div>
  </div>

</div>

<script>
  const DEFAULT_TEXT = `On the edge of a quiet harbor, there was a lighthouse that had forgotten how to shine.

Every evening, the keeper climbed the spiral stairs, polished the glass, checked the wires, and whispered encouragement to the old lamp. But when night arrived, the tower stayed dark.

The village below learned to work around it. Boats came in early. Children carried lanterns along the pier. People stopped looking up, because looking up only reminded them of what was missing.

One windy afternoon, a girl named Mara found a small brass key tucked beneath a loose stone near the lighthouse door. It was warm, even though the air was cold, and it hummed softly in her hand.

Mara climbed to the lantern room and searched every drawer, hinge, and cabinet until she found a tiny keyhole hidden behind the mirror of the great lens.

When she turned the key, the lighthouse did not burst into light. Instead, it played a memory: the sound of waves, gulls, bells, and hundreds of voices calling goodnight across the water.

The lamp had not been broken. It had been lonely. It needed the town to remember it before it could remember itself.

So Mara ran down to the harbor and asked everyone to bring one light to the shore. Candles, lamps, flashlights, glowing phones, and even birthday sparklers appeared along the docks.

As the people lifted their lights, the lighthouse answered. A silver beam swept across the sea, brighter than anyone remembered, and every boat on the horizon turned safely home.

After that night, the village looked up again. Not because the lighthouse was perfect, but because they understood something important: even the brightest lights sometimes need another light to find their way back.

And every evening, just before sunset, Mara climbed the spiral stairs, turned the brass key, and listened as the lighthouse warmed itself with the sound of home.`;

  let playing = false;
  let pos = 0;
  let speed = 35;
  let fontSize = 38;
  let rafId = null;
  let lastTime = null;
  let editOpen = false;
  let savedDraft = '';
  let resizeStart = null;

  const app       = document.getElementById('app');
  const wrap      = document.getElementById('tp-wrap');
  const viewport  = document.getElementById('tp-viewport');
  const content   = document.getElementById('tp-content');
  const playBtn   = document.getElementById('play-btn');
  const progress  = document.getElementById('progress-fill');
  const textarea  = document.getElementById('edit-textarea');
  const charCount = document.getElementById('char-count');
  const editPanel = document.getElementById('edit-panel');
  const editBtn   = document.getElementById('edit-btn');
  const fontControls = document.querySelectorAll('.font-btn[data-font-delta]');
  const resizeHandles = document.querySelectorAll('.resize-handle');
  const cornerGlows = document.querySelectorAll('.corner-glow');

  function renderScript(text) {
    const paras = text.split(/\n\n+/).map(p => p.trim()).filter(Boolean);
    content.innerHTML = paras.map(p =>
      `<div class="para">${p.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}</div>`
    ).join('');
  }

  function getMaxScroll() {
    return Math.max(0, content.scrollHeight - viewport.clientHeight);
  }

  function syncScrollDisplay() {
    const max = getMaxScroll();
    pos = Math.min(pos, max);
    content.style.transform = `translateY(-${pos}px)`;
    progress.style.width = max ? `${(pos / max) * 100}%` : '100%';
  }

  function updateSpeed(val) {
    speed = parseInt(val);
    document.getElementById('speed-val').textContent = val;
  }

  function changeFont(delta) {
    fontSize = Math.min(80, Math.max(18, fontSize + delta));
    content.style.fontSize = fontSize + 'px';
    document.getElementById('font-size-display').textContent = fontSize + 'px';
  }

  function handleFontControl(e) {
    e.preventDefault();
    const delta = parseInt(e.currentTarget.dataset.fontDelta, 10);
    changeFont(delta);
  }

  function setPlayButton(isPlaying) {
    const icon = isPlaying
      ? '<svg class="btn-icon" viewBox="0 0 16 16" aria-hidden="true"><rect x="4" y="3" width="3" height="10" rx="0.75"></rect><rect x="9" y="3" width="3" height="10" rx="0.75"></rect></svg>'
      : '<svg class="btn-icon" viewBox="0 0 16 16" aria-hidden="true"><path d="M5 3.75v8.5L12 8 5 3.75z"></path></svg>';
    playBtn.innerHTML = icon + (isPlaying ? 'Pause' : 'Play');
  }

  function togglePlay() {
    playing = !playing;
    setPlayButton(playing);
    playBtn.classList.toggle('active', playing);
    if (playing) { lastTime = null; rafId = requestAnimationFrame(scroll); }
    else { cancelAnimationFrame(rafId); }
  }

  function resetScroll() {
    playing = false;
    cancelAnimationFrame(rafId);
    setPlayButton(false);
    playBtn.classList.remove('active');
    pos = 0;
    content.style.transform = 'translateY(0px)';
    progress.style.width = '0%';
  }

  function scroll(ts) {
    if (!lastTime) lastTime = ts;
    const delta = ts - lastTime;
    lastTime = ts;
    pos += (speed / 1000) * delta;
    const max = getMaxScroll();
    if (pos >= max) {
      pos = max;
      playing = false;
      setPlayButton(false);
      playBtn.classList.remove('active');
      progress.style.width = '100%';
      content.style.transform = `translateY(-${pos}px)`;
      return;
    }
    content.style.transform = `translateY(-${pos}px)`;
    progress.style.width = `${(pos / max) * 100}%`;
    if (playing) rafId = requestAnimationFrame(scroll);
  }

  function toggleEdit() {
    editOpen = !editOpen;
    if (editOpen) {
      savedDraft = textarea.value || getCurrentText();
      textarea.value = getCurrentText();
      updateCharCount();
      editPanel.classList.add('open');
      editBtn.classList.add('edit-active');
      requestAnimationFrame(() => {
        textarea.scrollTop = 0;
        textarea.focus({ preventScroll: true });
      });
    } else {
      editPanel.classList.remove('open');
      editBtn.classList.remove('edit-active');
    }
  }

  function getCurrentText() {
    return Array.from(content.querySelectorAll('.para'))
      .map(el => el.textContent)
      .join('\n\n');
  }

  function applyEdit() {
    const newText = textarea.value.trim();
    if (newText) {
      renderScript(newText);
      resetScroll();
    }
    toggleEdit();
  }

  function cancelEdit() {
    textarea.value = savedDraft;
    toggleEdit();
  }

  function updateCharCount() {
    charCount.textContent = textarea.value.length.toLocaleString() + ' characters';
  }

  function getResizeLimits() {
    const appStyles = getComputedStyle(app);
    const appPadding = parseFloat(appStyles.paddingLeft) + parseFloat(appStyles.paddingRight);
    const appGap = parseFloat(appStyles.columnGap || appStyles.gap) || 0;
    const panelWidth = editOpen ? editPanel.getBoundingClientRect().width + appGap : 0;
    const maxWidth = Math.max(420, Math.min(1500, window.innerWidth - appPadding - panelWidth));
    const maxHeight = Math.max(360, window.innerHeight - 220);

    return {
      minWidth: 420,
      maxWidth,
      minHeight: 320,
      maxHeight
    };
  }

  function getCornerName(handle) {
    return ['top-left', 'top-right', 'bottom-left', 'bottom-right']
      .find(name => handle.classList.contains(name));
  }

  function setCornerGlow(handle, active) {
    const corner = getCornerName(handle);
    if (!corner) return;
    const glow = document.querySelector(`.corner-glow.${corner}`);
    if (glow) glow.classList.toggle('active', active);
  }

  function clearCornerGlows() {
    cornerGlows.forEach(glow => glow.classList.remove('active'));
  }

  function startResize(e) {
    e.preventDefault();
    const handle = e.currentTarget;
    clearCornerGlows();
    setCornerGlow(handle, true);
    resizeStart = {
      pointerId: e.pointerId,
      handle,
      xDirection: parseInt(handle.dataset.x, 10),
      yDirection: parseInt(handle.dataset.y, 10),
      x: e.clientX,
      y: e.clientY,
      width: wrap.getBoundingClientRect().width,
      height: viewport.getBoundingClientRect().height
    };
    wrap.classList.add('resizing');
    document.body.classList.add('is-resizing');
    handle.setPointerCapture(e.pointerId);
    document.addEventListener('pointermove', resizeTeleprompter);
    document.addEventListener('pointerup', stopResize);
    document.addEventListener('pointercancel', stopResize);
    document.addEventListener('mousemove', resizeTeleprompterFromMouse);
    document.addEventListener('mouseup', stopResizeFromMouse);
  }

  function applyResize(clientX, clientY) {
    const limits = getResizeLimits();
    const deltaX = (clientX - resizeStart.x) * resizeStart.xDirection;
    const deltaY = (clientY - resizeStart.y) * resizeStart.yDirection;
    const nextWidth = Math.min(limits.maxWidth, Math.max(limits.minWidth, resizeStart.width + deltaX));
    const nextHeight = Math.min(limits.maxHeight, Math.max(limits.minHeight, resizeStart.height + deltaY));

    wrap.style.flex = `0 0 ${nextWidth}px`;
    viewport.style.height = `${nextHeight}px`;
    syncScrollDisplay();
  }

  function resizeTeleprompter(e) {
    if (!resizeStart || e.pointerId !== resizeStart.pointerId) return;
    applyResize(e.clientX, e.clientY);
  }

  function stopResize(e) {
    if (!resizeStart || e.pointerId !== resizeStart.pointerId) return;
    document.removeEventListener('pointermove', resizeTeleprompter);
    document.removeEventListener('pointerup', stopResize);
    document.removeEventListener('pointercancel', stopResize);
    document.removeEventListener('mousemove', resizeTeleprompterFromMouse);
    document.removeEventListener('mouseup', stopResizeFromMouse);
    resizeStart.handle.releasePointerCapture(e.pointerId);
    resizeStart = null;
    wrap.classList.remove('resizing');
    document.body.classList.remove('is-resizing');
    clearCornerGlows();
  }

  function resizeTeleprompterFromMouse(e) {
    if (!resizeStart || resizeStart.pointerId === 'mouse') return;
    applyResize(e.clientX, e.clientY);
  }

  function stopResizeFromMouse() {
    if (!resizeStart || resizeStart.pointerId === 'mouse') return;
    document.removeEventListener('pointermove', resizeTeleprompter);
    document.removeEventListener('pointerup', stopResize);
    document.removeEventListener('pointercancel', stopResize);
    document.removeEventListener('mousemove', resizeTeleprompterFromMouse);
    document.removeEventListener('mouseup', stopResizeFromMouse);
    resizeStart = null;
    wrap.classList.remove('resizing');
    document.body.classList.remove('is-resizing');
    clearCornerGlows();
  }

  function startMouseResize(e) {
    if (resizeStart) return;
    e.preventDefault();
    const handle = e.currentTarget;
    clearCornerGlows();
    setCornerGlow(handle, true);
    resizeStart = {
      pointerId: 'mouse',
      handle,
      xDirection: parseInt(handle.dataset.x, 10),
      yDirection: parseInt(handle.dataset.y, 10),
      x: e.clientX,
      y: e.clientY,
      width: wrap.getBoundingClientRect().width,
      height: viewport.getBoundingClientRect().height
    };
    wrap.classList.add('resizing');
    document.body.classList.add('is-resizing');
    document.addEventListener('mousemove', mouseResize);
    document.addEventListener('mouseup', stopMouseResize);
  }

  function mouseResize(e) {
    if (!resizeStart || resizeStart.pointerId !== 'mouse') return;
    applyResize(e.clientX, e.clientY);
  }

  function stopMouseResize() {
    if (!resizeStart || resizeStart.pointerId !== 'mouse') return;
    resizeStart = null;
    wrap.classList.remove('resizing');
    document.body.classList.remove('is-resizing');
    clearCornerGlows();
    document.removeEventListener('mousemove', mouseResize);
    document.removeEventListener('mouseup', stopMouseResize);
  }

  textarea.addEventListener('input', updateCharCount);
  resizeHandles.forEach(handle => {
    handle.addEventListener('pointerdown', startResize);
    handle.addEventListener('mousedown', startMouseResize);
    handle.addEventListener('mouseenter', () => setCornerGlow(handle, true));
    handle.addEventListener('mouseleave', () => {
      if (!resizeStart) setCornerGlow(handle, false);
    });
    handle.addEventListener('focus', () => setCornerGlow(handle, true));
    handle.addEventListener('blur', () => {
      if (!resizeStart) setCornerGlow(handle, false);
    });
  });

  fontControls.forEach(button => {
    button.addEventListener('click', handleFontControl);
    button.addEventListener('touchend', handleFontControl, { passive: false });
  });

  window.addEventListener('resize', syncScrollDisplay);

  document.addEventListener('keydown', (e) => {
    if (e.target === textarea) return;
    if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
    if (e.key === 'r' || e.key === 'R') resetScroll();
    if (e.key === '+' || e.key === '=') changeFont(2);
    if (e.key === '-' || e.key === '_') changeFont(-2);
    if (e.key === 'e' || e.key === 'E') toggleEdit();
  });

  // Init
  renderScript(DEFAULT_TEXT);
  setPlayButton(false);
</script>
</body>
</html>
